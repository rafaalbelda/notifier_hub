# Mobile battery level (from Companion App): sensor.phone_battery_level
# Mobile charging state (from Companion App): binary_sensor.phone_is_charging
# Low battery threshold helper: input_number.phone_low_battery_threshold
# Reminder interval helper: input_number.phone_battery_reminder_minutes
# Alternative fixed delay: "00:15:00"
# Notifier Hub must have notify services and Alexa players configured if those channels are enabled.

alias: MOBILE BATTERY - Low battery reminder
description: ""
triggers:
  - trigger: numeric_state
    entity_id:
      - sensor.phone_battery_level
    below: input_number.phone_low_battery_threshold
conditions:
  - condition: state
    entity_id: binary_sensor.phone_is_charging
    state:
      - "off"
actions:
  - repeat:
      while:
        - condition: numeric_state
          entity_id: sensor.phone_battery_level
          below: input_number.phone_low_battery_threshold
        - condition: state
          entity_id: binary_sensor.phone_is_charging
          state:
            - "off"
      sequence:
        - action: notifier_hub.send
          metadata: {}
          data:
            title: ⭐ Jarvis Battery.
            message: >-
              The phone battery is low: {{
              states('sensor.phone_battery_level') }}%.
            notify: true
            location: home
            no_show: false
            alexa: true
            phone: false
        # Fixed delay alternative:
        # - delay: "00:15:00"
        #  enabled: false
        # Create an input_number for the delay interval in minutes, e.g. input_number.phone_battery_reminder_minutes
        - delay:
            minutes: "{{ states('input_number.phone_battery_reminder_minutes') | int(15) }}"
mode: restart
