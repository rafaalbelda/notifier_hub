# Nivel de bateria del movil (Companion App): sensor.phone_battery_level
# Estado de carga del movil (Companion App): binary_sensor.phone_is_charging
# Umbral de bateria baja: input_number.phone_low_battery_threshold
# Intervalo de recordatorio en minutos: input_number.phone_battery_reminder_minutes
# Alternative fixed delay: "00:15:00"
# Notifier Hub must have notify services and Alexa players configured if those channels are enabled.

alias: BATERÍA MÓVIL - Recordatorio de batería baja
description: ""
triggers:
  - trigger: numeric_state
    entity_id:
      - sensor.phone_battery_level
    below: input_number.phone_low_battery_threshold
conditions:
  - condition: state
    entity_id: binary_sensor.phone_is_charging
    state:
      - "off"
actions:
  - repeat:
      while:
        - condition: numeric_state
          entity_id: sensor.phone_battery_level
          below: input_number.phone_low_battery_threshold
        - condition: state
          entity_id: binary_sensor.phone_is_charging
          state:
            - "off"
      sequence:
        - action: notifier_hub.send
          metadata: {}
          data:
            title: ⭐ Jarvis Batería.
            message: >-
              El móvil tiene la batería baja: {{
              states('sensor.phone_battery_level') }}%.
            notify: true
            location: home
            no_show: false
            alexa: true
            phone: false
        # Fixed delay alternative:
        # - delay: "00:15:00"
        #  enabled: false
        # Crea un input_number para el intervalo de recordatorio en minutos, por ejemplo input_number.phone_battery_reminder_minutes
        - delay:
            minutes: "{{ states('input_number.phone_battery_reminder_minutes') | int(15) }}"
mode: restart
