# Fuentes de temperatura exterior:
#   - sensor.outdoor_temperature_1
#   - sensor.outdoor_temperature_2
#   - weather.home atributo: temperature
# Fuentes de temperatura interior promediadas cuando estan disponibles:
#   - sensor.indoor_temperature_1
#   - sensor.indoor_temperature_2
#   - sensor.indoor_temperature_3
# Margen opcional de temperatura en grados: input_number.window_temperature_margin
# La temperatura exterior usada para cerrar ventanas es el valor maximo disponible.
# La temperatura exterior usada para abrir ventanas es el valor minimo disponible.
# La temperatura interior usada es la media de los sensores interiores disponibles.

alias: VENTANAS - Avisar si abrir o cerrar por temperatura exterior
description: ""
triggers:
  - id: cerrar_ventanas
    trigger: template
    value_template: >-
      {% set fuentes_interior = [
        states('sensor.indoor_temperature_1') | float(none),
        states('sensor.indoor_temperature_2') | float(none),
        states('sensor.indoor_temperature_3') | float(none)
      ] %}
      {% set interiores = fuentes_interior | reject('eq', none) | list %}
      {% set interior = ((interiores | sum) / (interiores | count)) if interiores | count > 0 else none %}
      {% set margen = states('input_number.window_temperature_margin') | float(0.5) %}
      {% set fuentes_exterior = [
        states('sensor.outdoor_temperature_1') | float(none),
        states('sensor.outdoor_temperature_2') | float(none),
        state_attr('weather.home', 'temperature') | float(none)
      ] %}
      {% set exteriores = fuentes_exterior | reject('eq', none) | list %}
      {{ interior is not none and exteriores | count > 0 and exteriores | max > interior + margen }}
    for:
      minutes: 5
  - id: abrir_ventanas
    trigger: template
    value_template: >-
      {% set fuentes_interior = [
        states('sensor.indoor_temperature_1') | float(none),
        states('sensor.indoor_temperature_2') | float(none),
        states('sensor.indoor_temperature_3') | float(none)
      ] %}
      {% set interiores = fuentes_interior | reject('eq', none) | list %}
      {% set interior = ((interiores | sum) / (interiores | count)) if interiores | count > 0 else none %}
      {% set margen = states('input_number.window_temperature_margin') | float(0.5) %}
      {% set fuentes_exterior = [
        states('sensor.outdoor_temperature_1') | float(none),
        states('sensor.outdoor_temperature_2') | float(none),
        state_attr('weather.home', 'temperature') | float(none)
      ] %}
      {% set exteriores = fuentes_exterior | reject('eq', none) | list %}
      {{ interior is not none and exteriores | count > 0 and exteriores | min < interior - margen }}
    for:
      minutes: 5
conditions: []
actions:
  - variables:
      temperatura_exterior: >-
        {% set fuentes_exterior = [
          states('sensor.outdoor_temperature_1') | float(none),
          states('sensor.outdoor_temperature_2') | float(none),
          state_attr('weather.home', 'temperature') | float(none)
        ] %}
        {% set exteriores = fuentes_exterior | reject('eq', none) | list %}
        {{ (exteriores | max) if trigger.id == 'cerrar_ventanas' else (exteriores | min) }}
      temperatura_interior: >-
        {% set fuentes_interior = [
          states('sensor.indoor_temperature_1') | float(none),
          states('sensor.indoor_temperature_2') | float(none),
          states('sensor.indoor_temperature_3') | float(none)
        ] %}
        {% set interiores = fuentes_interior | reject('eq', none) | list %}
        {{ ((interiores | sum) / (interiores | count)) | round(1) }}
      titulo: >-
        ⭐ Jarvis Ventanas.
      mensaje: >-
        {% if trigger.id == 'cerrar_ventanas' %}
          Hace más calor fuera que dentro. Cierra las ventanas para mantener la
          casa fresca. Exterior: {{ temperatura_exterior }}°C. Interior:
          {{ temperatura_interior }}°C.
        {% else %}
          Fuera hace menos calor que dentro. Abre las ventanas para refrescar la
          casa. Exterior: {{ temperatura_exterior }}°C. Interior:
          {{ temperatura_interior }}°C.
        {% endif %}
  - action: notifier_hub.send
    metadata: {}
    data:
      title: "{{ titulo }}"
      message: "{{ mensaje }}"
      notify: true
      location: home
      no_show: false
      alexa: true
      phone: false
mode: single
