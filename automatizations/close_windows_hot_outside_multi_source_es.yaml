# Outdoor temperature sources:
#   - sensor.openweathermap_temperatura
#   - sensor.aemet_temperature
#   - weather.casa attribute: temperatura
# Indoor temperature sources averaged when available:
#   - sensor.netatmo_carby_temperature
#   - sensor.xiaomi_th1_temperature
#   - sensor.xiaomi_th2_temperature
# Optional temperature margin helper in degrees: input_number.margen_temperatura_ventanas
# The outdoor temperature used for closing windows is the maximum available value.
# The outdoor temperature used for opening windows is the minimum available value.
# The indoor temperature used is the average of the available indoor sensors.

alias: VENTANAS - Avisar si abrir o cerrar por temperatura exterior
description: ""
triggers:
  - id: cerrar_ventanas
    trigger: template
    value_template: >-
      {% set fuentes_interior = [
        states('sensor.netatmo_carby_temperature') | float(none),
        states('sensor.xiaomi_th1_temperature') | float(none),
        states('sensor.xiaomi_th2_temperature') | float(none)
      ] %}
      {% set interiores = fuentes_interior | reject('eq', none) | list %}
      {% set interior = ((interiores | sum) / (interiores | count)) if interiores | count > 0 else none %}
      {% set margen = states('input_number.margen_temperatura_ventanas') | float(0.5) %}
      {% set fuentes_exterior = [
        states('sensor.openweathermap_temperatura') | float(none),
        states('sensor.aemet_temperature') | float(none),
        state_attr('weather.casa', 'temperatura') | float(none)
      ] %}
      {% set exteriores = fuentes_exterior | reject('eq', none) | list %}
      {{ interior is not none and exteriores | count > 0 and exteriores | max > interior + margen }}
    for:
      minutes: 5
  - id: abrir_ventanas
    trigger: template
    value_template: >-
      {% set fuentes_interior = [
        states('sensor.netatmo_carby_temperature') | float(none),
        states('sensor.xiaomi_th1_temperature') | float(none),
        states('sensor.xiaomi_th2_temperature') | float(none)
      ] %}
      {% set interiores = fuentes_interior | reject('eq', none) | list %}
      {% set interior = ((interiores | sum) / (interiores | count)) if interiores | count > 0 else none %}
      {% set margen = states('input_number.margen_temperatura_ventanas') | float(0.5) %}
      {% set fuentes_exterior = [
        states('sensor.openweathermap_temperatura') | float(none),
        states('sensor.aemet_temperature') | float(none),
        state_attr('weather.casa', 'temperatura') | float(none)
      ] %}
      {% set exteriores = fuentes_exterior | reject('eq', none) | list %}
      {{ interior is not none and exteriores | count > 0 and exteriores | min < interior - margen }}
    for:
      minutes: 5
conditions: []
actions:
  - variables:
      temperatura_exterior: >-
        {% set fuentes_exterior = [
          states('sensor.openweathermap_temperatura') | float(none),
          states('sensor.aemet_temperature') | float(none),
          state_attr('weather.casa', 'temperatura') | float(none)
        ] %}
        {% set exteriores = fuentes_exterior | reject('eq', none) | list %}
        {{ (exteriores | max) if trigger.id == 'cerrar_ventanas' else (exteriores | min) }}
      temperatura_interior: >-
        {% set fuentes_interior = [
          states('sensor.netatmo_carby_temperature') | float(none),
          states('sensor.xiaomi_th1_temperature') | float(none),
          states('sensor.xiaomi_th2_temperature') | float(none)
        ] %}
        {% set interiores = fuentes_interior | reject('eq', none) | list %}
        {{ ((interiores | sum) / (interiores | count)) | round(1) }}
      titulo: >-
        ⭐ Jarvis Ventanas.
      mensaje: >-
        {% if trigger.id == 'cerrar_ventanas' %}
          Hace más calor fuera que dentro. Cierra las ventanas para mantener la
          casa fresca. Exterior: {{ temperatura_exterior }}°C. Interior:
          {{ temperatura_interior }}°C.
        {% else %}
          Fuera hace menos calor que dentro. Abre las ventanas para refrescar la
          casa. Exterior: {{ temperatura_exterior }}°C. Interior:
          {{ temperatura_interior }}°C.
        {% endif %}
  - action: notifier_hub.send
    metadata: {}
    data:
      title: "{{ titulo }}"
      message: "{{ mensaje }}"
      notify: true
      location: home
      no_show: false
      alexa: true
      phone: false
mode: single
