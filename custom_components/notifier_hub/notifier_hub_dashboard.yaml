title: Notifier Hub
views:
  - title: Notifier Hub
    path: notifier-hub
    icon: mdi:bell-ring
    type: masonry
    badges: []
    cards:
      - type: markdown
        content: |
          # {{ states('sensor.notifier_hub_personal_assistant') }}

      - type: entities
        title: Estado
        show_header_toggle: false
        entities:
          - entity: sensor.notifier_hub_debug
            name: Debug
          - entity: sensor.notifier_hub_last_message
            name: Ultimo mensaje
          - entity: sensor.notifier_hub_personal_assistant
            name: Asistente
          - entity: sensor.notifier_hub_home_people
            name: Personas en casa
          - type: attribute
            entity: sensor.notifier_hub_home_people
            attribute: home_person_names
            name: Quien esta en casa
          - entity: binary_sensor.notifier_hub_home_occupied
            name: Casa ocupada
          - entity: binary_sensor.notifier_hub_alexa_speak
            name: Alexa hablando
          - entity: binary_sensor.notifier_hub_google_speak
            name: Google hablando

      - type: entities
        title: Canales
        show_header_toggle: false
        state_color: true
        entities:
          - entity: switch.notifier_hub_text_notifications
            name: Texto
          - entity: switch.notifier_hub_screen_notifications
            name: Persistente
          - entity: switch.notifier_hub_speech_notifications
            name: Voz
          - entity: switch.notifier_hub_speech_home_only
            name: Voz solo si hay alguien en casa
          - entity: switch.notifier_hub_alexa_notifications
            name: Alexa
          - entity: switch.notifier_hub_google_notifications
            name: Google
          - entity: switch.notifier_hub_phone_notifications
            name: Telefono
          - entity: switch.notifier_hub_home_assistant_event_notifications
            name: Eventos HA
          - entity: switch.notifier_hub_auto_volume
            name: Auto volume

      - type: entities
        title: Modos
        show_header_toggle: false
        state_color: true
        entities:
          - entity: switch.notifier_hub_dnd
            name: No molestar
          - entity: switch.notifier_hub_guest_mode
            name: Invitados
          - entity: switch.notifier_hub_priority_message
            name: Prioridad siguiente mensaje

      - type: entities
        title: Auto Volume
        show_header_toggle: false
        entities:
          - entity: sensor.notifier_hub_day_period
            name: Periodo actual
          - entity: sensor.notifier_hub_day_period_volume
            name: Volumen actual
          - entity: time.notifier_hub_altas_horas_start
            name: Altas horas inicio
          - entity: number.notifier_hub_altas_horas_volume
            name: Altas horas volumen
          - entity: time.notifier_hub_primera_hora_start
            name: Primera hora inicio
          - entity: number.notifier_hub_primera_hora_volume
            name: Primera hora volumen
          - entity: time.notifier_hub_manana_start
            name: Manana inicio
          - entity: number.notifier_hub_manana_volume
            name: Manana volumen
          - entity: time.notifier_hub_tarde_start
            name: Tarde inicio
          - entity: number.notifier_hub_tarde_volume
            name: Tarde volumen
          - entity: time.notifier_hub_atardecer_start
            name: Atardecer inicio
          - entity: number.notifier_hub_atardecer_volume
            name: Atardecer volumen
          - entity: time.notifier_hub_noche_start
            name: Noche inicio
          - entity: number.notifier_hub_noche_volume
            name: Noche volumen

      - type: history-graph
        title: Actividad TTS
        hours_to_show: 6
        entities:
          - entity: binary_sensor.notifier_hub_alexa_speak
            name: Alexa
          - entity: binary_sensor.notifier_hub_google_speak
            name: Google

      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## Pruebas rapidas
              Estos botones llaman al servicio `notifier_hub.send`.

          - type: horizontal-stack
            cards:
              - type: button
                name: Texto
                icon: mdi:message-text
                tap_action:
                  action: call-service
                  service: notifier_hub.send
                  data:
                    title: Dashboard
                    message: Prueba de notificacion desde Notifier Hub
                    notify: true

              - type: button
                name: Prioridad
                icon: mdi:alert-circle
                tap_action:
                  action: call-service
                  service: notifier_hub.send
                  data:
                    title: Prioridad
                    message: Mensaje prioritario de prueba desde Notifier Hub
                    notify: true
                    priority: true

          - type: horizontal-stack
            cards:
              - type: button
                name: Alexa
                icon: mdi:speaker-message
                tap_action:
                  action: call-service
                  service: notifier_hub.send
                  data:
                    title: Alexa
                    message: Prueba de voz desde Notifier Hub
                    notify: false
                    alexa: true

              - type: button
                name: Google
                icon: mdi:google-assistant
                tap_action:
                  action: call-service
                  service: notifier_hub.send
                  data:
                    title: Google
                    message: Prueba de voz desde Notifier Hub
                    notify: false
                    google: true

      - type: logbook
        title: Eventos recientes
        hours_to_show: 6
        entities:
          - sensor.notifier_hub_debug
          - sensor.notifier_hub_last_message
          - sensor.notifier_hub_personal_assistant
          - sensor.notifier_hub_home_people
          - binary_sensor.notifier_hub_home_occupied
          - binary_sensor.notifier_hub_alexa_speak
          - binary_sensor.notifier_hub_google_speak

      - type: markdown
        content: |
          ## Registro YAML

          Para mostrar este panel en la barra lateral, anade esto a `configuration.yaml`:

          ```yaml
          lovelace:
            dashboards:
              notifier-hub:
                mode: yaml
                title: Notifier Hub
                icon: mdi:bell-ring
                show_in_sidebar: true
                filename: notifier_hub_dashboard.yaml
          ```
