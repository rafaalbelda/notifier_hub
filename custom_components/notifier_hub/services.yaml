send:
  name: Enviar notificación
  description: Envía una notificación de texto, persistente, Alexa y/o llamada telefónica. Compatible con parte del evento AppDaemon `notifier`.
  fields:
    title:
      name: Título
      selector:
        text:
      default: ""
    message:
      name: Mensaje
      required: true
      selector:
        text:
          multiline: true
    notify:
      name: Servicios notify
      description: Lista o cadena separada por comas. Usa true/on para los servicios por defecto.
      selector:
        object:
      default: true
    no_show:
      name: No mostrar persistente
      selector:
        boolean:
      default: false
    priority:
      name: Prioridad
      selector:
        boolean:
      default: false
    location:
      name: Ubicación
      description: Estado requerido para los canales sujetos a ubicación, por ejemplo home. Déjalo vacío para no aplicar filtro.
      selector:
        text:
      default: ""
    alexa:
      name: Alexa
      description: true/on o diccionario con media_player, volume, type, method, voice, language, ssml, push, event_id, media_content_id...
      selector:
        object:
      default: false
    google:
      name: Google / Cast
      description: true/on o diccionario con media_player, volume, tts_service/tts_entity, language, mode, notify_service, media_content_id...
      selector:
        object:
      default: false
    phone:
      name: Llamada telefónica
      selector:
        boolean:
      default: false
    called_number:
      name: Número llamado
      selector:
        text:
      default: ""
    image:
      name: Imagen
      description: Ruta local o URL de una imagen para Telegram, Pushover, Discord o mobile_app.
      selector:
        text:
      default: ""
