blueprint:
  name: Centro Notifiche - Configuración de inicio
  description:
    "`v5.1.2.es`\nBlueprint para configurar el [Package Centro Notifiche](https://api.github.com/repos/caiosweet/Package-Notification-HUB-AppDaemon/releases/latest)
    para Appdaemon [Notifier Center](https://github.com/jumping2000/notifier) \U0001F514
    -  Authors [Caio](https://github.com/caiosweet), [Gianpi](https://github.com/jumping2000)
    by [Site hassiohelp](https://hassiohelp.eu/) Date Started 01/11/2019 - Updated
    01/07/2023 Spanish Translation [rafaalbelda](https://github.com/rafaalbelda) -
    21/12/2023\nLa guía de referencia para utilizar el Proyecto del Centro de notificaciones
    y otra información se pueden encontrar en [wiki](https://github.com/caiosweet/Package-Notification-HUB-AppDaemon/wiki)\n"
  domain: automation
  author: https://github.com/caiosweet
  homeassistant:
    min_version: 2023.6.0
  input:
    packages_folder:
      name: Package folder
      description:
        "Ingrese la ruta de la carpeta [packages](https://www.home-assistant.io/docs/configuration/packages/#create-a-packages-folder)
        en el directorio de configuración de Home Assistant.


        _Path packages folder in your Home Assistant configuration directory_

        default /config/packages"
      selector:
        text:
          multiple: false
          multiline: false
      default: /config/packages
    personal_assistant:
      name: Personal Assistant
      description: "Establece el nombre de tu asistente personal.

        Se utilizará en los títulos de los mensajes de texto, en el tablero y en las
        notificaciones del asistente del hogar..

        Ejemplo **[Jarvis - 20:43:12] Garage**


        _Choose a name for your personal assistant_

        default empty"
      selector:
        text:
          multiple: false
          multiline: false
      default: ""
    person:
      name: Person
      description:
        "Añade uno o más [personas](https://www.home-assistant.io/integrations/person/)
        para gestionar la asistencia en casa.

        Se creará un grupo y un sensor según la lista. Además, el sensor tendrá los
        atributos de número y nombre, correspondientes al número de personas en la
        casa y sus respectivos nombres..


        _List of People_

        default empty


        [![Open your Home Assistant instance and show your people.](https://my.home-assistant.io/badges/people.svg)](https://my.home-assistant.io/redirect/people/)"
      selector:
        entity:
          multiple: true
          filter:
            - domain:
                - person
      default: []
    alexa_media_player:
      name: Alexa Media Player
      description:
        "Agregue uno o más reproductores multimedia si usa [Alexa Media](https://github.com/custom-components/alexa_media_player).\nSe
        creará un grupo a partir de la lista resultante.. \nAdemás, el selector del
        reproductor multimedia de Alexa se completará automáticamente para elegir
        un dispositivo predeterminado., \npara usar con el Centro Notifiche.\n\n_Alexa
        Media Player list_\ndefault empty"
      selector:
        entity:
          multiple: true
          filter:
            - integration: alexa_media
              domain:
                - media_player
      default: []
    alexa_group_player:
      name: Alexa Group Player
      description:
        "Elija uno o más grupos de reproductores multimedia para Alexa.

        Se agregarán al selector de dispositivos predeterminado, junto con los reproductores
        multimedia anteriores de Alexa.


        _Alexa Group Player list_

        default empty


        [![Open your Home Assistant instance and show your helper entities.](https://my.home-assistant.io/badges/helpers.svg)](https://my.home-assistant.io/redirect/helpers/)"
      selector:
        entity:
          multiple: true
          filter:
            - integration: group
      default: []
    google_media_player:
      name: Google Media Player
      description:
        "Agregue uno o más reproductores multimedia si usa [Google Cast](https://www.home-assistant.io/integrations/cast/)


        _List of Google Media Player_

        default empty


        [![Open your Home Assistant instance and start setting up a new integration.](https://my.home-assistant.io/badges/config_flow_start.svg)](https://my.home-assistant.io/redirect/config_flow_start/?domain=cast)"
      selector:
        entity:
          multiple: true
          filter:
            - integration: cast
              domain:
                - media_player
      default: []
    google_group_player:
      name: Google Group Player
      description:
        "Elija uno o más grupos de reproductores multimedia para Google.

        Se agregarán al selector de dispositivos predeterminado, junto con los reproductores
        multimedia anteriores de Google.


        _List of google Group Player_

        default empty


        [![Open your Home Assistant instance and show your helper entities.](https://my.home-assistant.io/badges/helpers.svg)](https://my.home-assistant.io/redirect/helpers/)"
      selector:
        entity:
          multiple: true
          filter:
            - integration: group
      default: []
    notify_service_list:
      name: Notify list
      description:
        "Agregue servicios de notificación para recibir notificaciones
        de texto.\nSi desea enviar múltiples notificaciones a diferentes dispositivos,
        \ny no has creado un [grupo de notificaciones](https://www.home-assistant.io/integrations/group/#notify-groups),
        simplemente agregue múltiples servicios separados por una coma. \n`(es. -
        notify.notify, notify.mobile_app_pixel_7)`\n`(puede funcionar bien incluso
        sin notificar: - Mobile App Pixel 7, telegram)`\n\nEjemplo completo de cómo
        elaborar la lista a mano, con múltiples y únicos servicios.\n```\n- notify.telegram\n-
        notify.mobile_app_pixel_7\n- notify.notify, notify.mobile_app_pixel_7\n- notify.discord,
        notify.telegram, notify.pushover\n- notify.persistent_notification\n- Telegram
        html\n- News Telegram\n- Test Nome NOTIFICA\n- Mobile App Pixel 7, Pushbullet,
        Pushover, WhatsApp\n```\n\n_List of notify service_\ndefault - notify.persistent_notification,
        notify.notify\n\n[![Open your Home Assistant instance and show your service
        developer tools.](https://my.home-assistant.io/badges/developer_services.svg)](https://my.home-assistant.io/redirect/developer_services/)"
      selector:
        object: {}
      default:
        - notify.persistent_notification
        - notify.notify
    enabled_home_assistant_event:
      name: Notification Home Assistant Event
      description:
        "Permitiendo recibir los siguientes eventos de home assistant:\nInicio,
        escritura final, apagado, parada y reinicio manual.\nComo opción, puedes añadir
        el sensor para conocer los tiempos de inicio del asistente del hogar, que
        encuentras en la ficha, en tu sistema [utility](https://github.com/rafaalbelda/Package-Notification-HUB-AppDaemon/tree/main/extra)\n```\n[Jerry
        - 17:31:15] HomeAssistant Start!\nBuenas noches.\n\U0001F4EC ¡Jerry está en
        funcionamiento!. \U0001F575️\n\U0001F7E9 Home Assistant initialized in 50.21s\n```\n\n_Notification
        Home Assistant Start/Final Write/Close/Stop/Restart_\n_As an option, you can
        add in your system the sensor to know the home assistant startup time, which
        you find in the file [utility]_\ndefault: on"
      selector:
        boolean: {}
      default: true
    ha_event_notify:
      name: Notify service Notification Home Assistant Event
      description:
        'Puede elegir uno o más servicios de "notificación" diferentes
        para las notificaciones de Home Assistant, en lugar del predeterminado.

        Por ejemplo, si desea recibir notificaciones de Inicio/Escritura final/Cerrar/Detener/Reiniciar
        de Home Assistant solo en su dispositivo móvil

        `- notify.mobile_app_pixel_7 `


        _You can choose one or more different "notify" services for Home Assistant
        notifications instead of the default one._

        default: the state of the text notification selector'
      selector:
        object: {}
      default: []
    enabled_auto_volume:
      name: Auto volume
      description:
        "Los volúmenes se actualizan en función del sensor del periodo
        del día, a configurar desde la interfaz gráfica (Dashborad o cards).

        Las entidades a fijar son los horarios y volúmenes desde primera hora de la
        mañana hasta altas horas de la noche.


        _Media player volume adjustment, based on Period of day volume sensor_

        default: on"
      selector:
        boolean: {}
      default: true
    time_pattern_hours:
      name: Pattern hours
      description:
        "Actualización de volumen que se repite según la cantidad de horas
        seleccionadas.

        Ej. 4, la actualización se repetirá cada 4 horas.


        _Updates every x hours._

        default: 0"
      selector:
        number:
          min: 0.0
          max: 24.0
          step: 1.0
          unit_of_measurement: h
          mode: box
      default: 0
    exclude_media_player:
      name: Exclude Media Player
      description:
        "Seleccione cualquier reproductor multimedia (esto se aplica tanto
        a Alexa como a Google) para excluirlo del volumen automático.


        _Exclude Media Player from auto volume sequence_

        default: empty"
      selector:
        entity:
          multiple: true
          filter:
            - domain:
                - media_player
            - domain:
                - group
      default: []
    tts_google:
      name: Service TTS Google
      description:
        "Ingrese al servicio para el [TTS Google Translate](https://www.home-assistant.io/integrations/google_translate/).\nPor
        ejemplo, si el servicio es tts.google_say, simplemente escribe google_say\n\n_Service
        [Text-to-Speech (TTS)](https://www.home-assistant.io/integrations/tts/#service-say-legacy):
        \nSay a TTS message with Google Translate_\ndefault: google_translate_say"
      selector:
        text:
          multiple: false
          multiline: false
      default: google_translate_say
    tts_google_cloud:
      name: Service TTS Google Cloud
      description: "Ingrese al servicio de Google Cloud TTS.


        _Service TTS Google Cloud_

        default: google_cloud"
      selector:
        text:
          multiple: false
          multiline: false
      default: google_cloud
    reverso_tts:
      name: Service Reverso TTS
      description:
        "Ingrese el servicio para el componente personalizado de [Reverso
        TTS](https://github.com/rt400/ReversoTTS-HA).


        _Service Reverso TTS_

        default: reversotts_say"
      selector:
        text:
          multiple: false
          multiline: false
      default: reversotts_say
    sip_server_name:
      name: Service Sip server name
      description:
        "Ingrese el servidor SIP utilizado por el [Addon ha-sip](https://github.com/arnonym/ha-plugins)
        para realizar llamadas VoIP.


        _Service Sip server name_

        default: fritz.box:5060"
      selector:
        text:
          multiple: false
          multiline: false
      default: fritz.box:5060
    alexa_skill_id:
      name: Notifier Alexa actionable skill ID
      description:
        "Ingrese su ID de habilidades de Alexa para [Alexa Actionable notifications](https://github.com/keatontaylor/alexa-actions)


        _Notifier Alexa actionable skill ID_

        default: empty"
      selector:
        text:
          multiple: false
          multiline: false
      default: ""
    download:
      name: Download
      description:
        "Le permite descargar los archivos de la versión más reciente del
        paquete cuando reinicia la aplicación Notifier.

        Los archivos se guardarán en la carpeta Notification_center en el directorio
        de paquetes.


        _Download the new stable version of the package from Github._

        default: off"
      selector:
        boolean: {}
      default: false
    beta_version:
      name: Beta Version
      description: "Descargue la versión beta en lugar de la versión estable.


        _Download the beta version instead of the stable one._

        default: off"
      selector:
        boolean: {}
      default: false
    debug:
      name: Debug and extra info
      description: "Modo de depuración.


        _Show entra information for trigger e configuration_

        default: off"
      selector:
        boolean: {}
      default: false
  source_url: https://github.com/rafaalbelda/Package-Notification-HUB-AppDaemon/blob/spanish/blueprints/automation/caiosweet/notifier_startup_configuration.yaml
mode: parallel
max: 50
max_exceeded: silent
trace:
  stored_traces: 10
trigger_variables:
  time_pattern_hours: !input time_pattern_hours
  enabled: !input enabled_auto_volume
trigger:
  - id: time_pattern_hours
    trigger: template
    value_template:
      "{{ enabled and time_pattern_hours > 0 and now().hour % time_pattern_hours
      == 0\n  and now().minute == 0 and now().second == 0 }}"
  - id: notifier_on
    trigger: state
    entity_id: sensor.notifier_debug_error
    to: "on"
  - id: hass_start
    trigger: homeassistant
    event: start
  - id: hass_shutdown
    trigger: homeassistant
    event: shutdown
  - id: hass_final_write
    trigger: event
    event_type: homeassistant_final_write
  - id: hass_close
    trigger: event
    event_type: homeassistant_close
  - id: hass_restart
    trigger: event
    event_type: call_service
    event_data:
      domain: homeassistant
      action: restart
  - id: reload
    trigger: event
    event_type: automation_reloaded
  - id: notifier_auto_volume
    trigger: state
    entity_id: sensor.notifier_day_period_volume
    attribute: vol
  - id: notifier_intercom_message
    trigger: state
    entity_id: input_text.notifier_intercom_message
    not_to:
      - unavailable
      - unknown
      - ""
  - id: notifier_guest_mode
    trigger: state
    entity_id: input_boolean.notifier_guest_mode
    to:
      - "on"
      - "off"
  - id: template_entities_update
    trigger: state
    entity_id:
      - binary_sensor.notifier_dnd
      - binary_sensor.notifier_people_home
      - select.notifier_text_notify
      - select.notifier_player_alexa
      - select.notifier_player_google
      - sensor.notifier_day_period
      - sensor.notifier_day_period_volume
      - sensor.notifier_player_alexa
      - sensor.notifier_player_google
      - sensor.notifier_text_notify
    not_to:
      - unavailable
      - unknown
      - none
  - id: reset_config
    trigger: state
    entity_id: input_button.notifier_reset_config
action:
  - variables:
      ui_person: !input person
      ui_alexa_player: !input alexa_media_player
      ui_alexa_group: !input alexa_group_player
      ui_google_player: !input google_media_player
      ui_google_group: !input google_group_player
  - variables:
      packages_folder: !input &id001 packages_folder
      personal_assistant: !input &id002 personal_assistant
      notify_service_list: !input &id003 notify_service_list
      enabled_home_assistant_event: !input &id004 enabled_home_assistant_event
      ha_event_notify: !input &id005 ha_event_notify
      enabled_auto_volume: !input &id006 enabled_auto_volume
      time_pattern_hours: !input &id007 time_pattern_hours
      exclude_media_player: !input &id008 exclude_media_player
      tts_google: !input &id009 tts_google
      tts_google_cloud: !input &id010 tts_google_cloud
      reverso_tts: !input &id011 reverso_tts
      sip_server_name: !input &id012 sip_server_name
      alexa_skill_id: !input &id013 alexa_skill_id
      debug: !input &id014 debug
      download: !input &id015 download
      beta_version: !input &id016 beta_version
      is_script: "{{ has_value('script.my_notify') }}"
      person: "{{ ui_person | select('in', integration_entities('person')) | list}}"
      alexa_media_player:
        "{{ ui_alexa_player | select('in', integration_entities('alexa_media'))
        | list }}"
      alexa_group_player:
        "{{ ui_alexa_group | select('in', integration_entities('group'))
        | list }}"
      google_media_player:
        "{{ ui_google_player | select('in', integration_entities('cast'))
        | list }}"
      google_group_player:
        "{{ ui_google_group | select('in', integration_entities('group'))
        | list }}"
  - alias: Configuration
    choose:
      - conditions:
          - or:
              - "{{ trigger.id in ['hass_start', 'reload', 'reset_config', 'notifier_on',
                'template_entities_update'] }}"
              - "{{ trigger.platform is none }}"
        sequence:
          - alias: RESTART APP AND DOWNLOAD
            if:
              - "{{ trigger.id in ['reload'] }}"
              - "{{ not is_script and download }}"
            then:
              - event: notifier
                event_data:
                  ad:
                    command: restart
              - action: persistent_notification.create
                data:
                  notification_id: centro_notifiche_config_download
                  title: Configuración del Centro de Notificaciones
                  message: '## Restart Notifier App and Download Package


                    ➡ {{ now().time() }}"

                    '
              - stop: Wait App
          - alias: Create groups only on boot and reload
            if:
              - "{{ is_script }}"
              - "{{ trigger.id in ['hass_start', 'reload'] }}"
            then:
              - alias: Creation of an notifier_automations Group
                action: group.set
                data:
                  object_id: notifier_automations
                  entities:
                    "{# Backword compatible .endswith('hub') #} {{states.automation\n
                    \ | select('match','.*[_\\s]hub|.*notifier[_\\s]|.*centro.notifiche[_\\s]',
                    ignorecase=True)\n  | map(attribute='entity_id') | list }}"
              - alias: Creation of the notifier_location_tracker Group from Person
                if: "{{ not not person }}"
                then:
                  - action: group.set
                    data:
                      object_id: notifier_location_tracker
                      entities: "{{ person }}"
              - alias: Creation of the notifier_player_alexa Group, if Alexa exists
                if: "{{ not not alexa_media_player }}"
                then:
                  - action: group.set
                    data:
                      object_id: notifier_player_alexa
                      entities: "{{ alexa_media_player }}"
              - alias: Creation of the notifier_player_google Group, if Google exists
                if: "{{ not not google_media_player }}"
                then:
                  - action: group.set
                    data:
                      object_id: notifier_player_google
                      entities: "{{ google_media_player }}"
          - variables:
              zero_time:
                "{% set a = states('input_datetime.notifier_start_early_morning')
                %} {% set b = states('input_datetime.notifier_start_morning') %} {% set
                c = states('input_datetime.notifier_start_afternoon') %} {% set d = states('input_datetime.notifier_start_evening')
                %} {% set e = states('input_datetime.notifier_start_night') %} {% set
                f = states('input_datetime.notifier_start_late_night') %} {% set g = states('input_datetime.notifier_start_weekdays')
                %} {% set h = states('input_datetime.notifier_end_weekdays') %} {% set
                i = states('input_datetime.notifier_start_holidays') %} {% set l = states('input_datetime.notifier_end_holidays')
                %} {% set lst = [a,b,c,d,e,f,g,h,i,l] %} {{ (lst[:-1] == lst[1:]) and not
                'unknown' in lst }}

                "
          - alias: Set the default settings to get started
            if:
              - "{{ is_script }}"
              - "{{ (trigger.id == 'reset_config') or zero_time }}"
            then:
              - alias: Set Guest if the people list is empty.
                if: "{{ not person }}"
                then:
                  action: input_boolean.turn_on
                  target:
                    entity_id:
                      - input_boolean.notifier_guest_mode
              - alias: Set the default times
                repeat:
                  for_each:
                    - target: input_datetime.notifier_start_early_morning
                      time: "05:00:00"
                    - target: input_datetime.notifier_start_morning
                      time: "07:00:00"
                    - target: input_datetime.notifier_start_afternoon
                      time: "12:00:00"
                    - target: input_datetime.notifier_start_evening
                      time: "18:00:00"
                    - target: input_datetime.notifier_start_night
                      time: "22:00:00"
                    - target: input_datetime.notifier_start_late_night
                      time: "01:00:00"
                    - target: input_datetime.notifier_start_weekdays
                      time: "23:00:00"
                    - target: input_datetime.notifier_end_weekdays
                      time: "07:00:00"
                    - target: input_datetime.notifier_start_holidays
                      time: "23:00:00"
                    - target: input_datetime.notifier_end_holidays
                      time: "08:00:00"
                  sequence:
                    - action: input_datetime.set_datetime
                      data:
                        time: "{{ repeat.item.time }}"
                      target:
                        entity_id: "{{ repeat.item.target }}"
              - alias: Set the default volumes
                repeat:
                  for_each:
                    - target: input_number.notifier_early_morning_volume
                      volume: 20
                    - target: input_number.notifier_morning_volume
                      volume: 30
                    - target: input_number.notifier_afternoon_volume
                      volume: 40
                    - target: input_number.notifier_evening_volume
                      volume: 30
                    - target: input_number.notifier_night_volume
                      volume: 20
                    - target: input_number.notifier_late_night_volume
                      volume: 10
                  sequence:
                    - action: input_number.set_value
                      data:
                        value: "{{ repeat.item.volume }}"
                      target:
                        entity_id: "{{ repeat.item.target }}"
              - alias: Set Text and Screen notification switches
                action: input_boolean.turn_on
                target:
                  entity_id:
                    - input_boolean.notifier_text_notifications
                    - input_boolean.notifier_screen_notifications
              - alias: Set first notify service in the text notification selector
                if: "{{ not not notify_service_list }}"
                then:
                  - action: select.select_first
                    target:
                      entity_id: select.notifier_text_notify
              - alias: Set Speech notification
                if: "{{ not not (alexa_media_player + google_media_player) }}"
                then:
                  - action: input_boolean.turn_on
                    target:
                      entity_id: input_boolean.notifier_speech_notifications
                  - action: input_number.set_value
                    data:
                      value: 5
                    target:
                      entity_id: input_number.notifier_tts_wait_time
                  - if: "{{ not not alexa_media_player }}"
                    then:
                      - action: select.select_first
                        target:
                          entity_id: select.notifier_player_alexa
                      - action: input_boolean.turn_on
                        target:
                          entity_id:
                            - input_boolean.notifier_alexa_switch
                            - input_boolean.notifier_alexa_ssml
                            - input_boolean.notifier_alexa_smart_volume
                      - action: button.press
                        target:
                          entity_id: button.notifier_alexa_ssml_reset
                  - if: "{{ not not google_media_player }}"
                    then:
                      - action: select.select_first
                        target:
                          entity_id: select.notifier_player_google
                      - action: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.notifier_google_switch
              - alias: Set input_text.notifier_called_number blank if unknown
                if: "{{ states('input_text.notifier_called_number') == 'unknown' }}"
                then:
                  - action: input_text.set_value
                    data:
                      entity_id: input_text.notifier_called_number
                      value: ""
              - alias: Welcome message
                action: script.my_notify
                data:
                  title: "\U0001F4EC ¡Bienvenido al Centro de Notificaciones! \U0001F575"
                  message: "¡Centro de notificaciones configurado y operativo!

                    "
                  alexa:
                    voice: Giorgio
                    type: tts
                  google: true
          - alias:
              Clean the recorder. Remove orphaned groups on reload, only if has value
              but the script is missing.
            if:
              - "{{ not is_script }}"
              - "{{ trigger.id in ['reload'] }}"
              - "{{ has_value('group.notifier_automations') }}"
            then:
              - alias: Remove group
                repeat:
                  for_each:
                    - group.notifier_location_tracker
                    - group.notifier_player_alexa
                    - group.notifier_player_google
                    - group.notifier_automations
                  sequence:
                    if: "{{ repeat.item in integration_entities('group') }}"
                    then:
                      - action: group.remove
                        data:
                          object_id: "{{ repeat.item.split('.')[1] }}"
              - action: recorder.purge_entities
                data:
                  keep_days: 0
                  entity_globs: .notifier_*
                target:
                  entity_id: script.my_notify
              - action: persistent_notification.create
                data:
                  notification_id: centro_notifiche_config_purge
                  title: Purgar Centro de Notificaciones
                  message: PURGE DATABASE
          - alias: SET CONFIGURATION SENSOR
            event: notifier_config
            event_data: &id017
              packages_folder: *id001
              personal_assistant: *id002
              notify_service_list: *id003
              enabled_home_assistant_event: *id004
              ha_event_notify: *id005
              enabled_auto_volume: *id006
              time_pattern_hours: *id007
              exclude_media_player: *id008
              tts_google: *id009
              tts_google_cloud: *id010
              reverso_tts: *id011
              sip_server_name: *id012
              alexa_skill_id: *id013
              debug: *id014
              download: *id015
              beta_version: *id016
              is_script: "{{ has_value('script.my_notify') }}"
              person:
                "{{ ui_person | select('in', integration_entities('person')) |
                list}}"
              alexa_media_player:
                "{{ ui_alexa_player | select('in', integration_entities('alexa_media'))
                | list }}"
              alexa_group_player:
                "{{ ui_alexa_group | select('in', integration_entities('group'))
                | list }}"
              google_media_player:
                "{{ ui_google_player | select('in', integration_entities('cast'))
                | list }}"
              google_group_player:
                "{{ ui_google_group | select('in', integration_entities('group'))
                | list }}"
              dnd: "{{ states('binary_sensor.notifier_dnd') }}"
              people_home: "{{ states('binary_sensor.notifier_people_home') }}"
              day_period: "{{ states('sensor.notifier_day_period') }}"
              day_period_volume: "{{ states('sensor.notifier_day_period_volume') }}"
              alexa_sensor: "{{ states('sensor.notifier_player_alexa') }}"
              alexa_select: "{{ states('select.notifier_player_alexa') }}"
              alexa_options:
                "{{ state_attr('select.notifier_player_alexa', 'options')
                }}"
              google_sensor: "{{ states('sensor.notifier_player_google') }}"
              google_select: "{{ states('select.notifier_player_google') }}"
              google_options:
                "{{ state_attr('select.notifier_player_google', 'options')
                }}"
              notify_sensor: "{{ states('sensor.notifier_text_notify') }}"
              notify_select: "{{ states('select.notifier_text_notify') }}"
              notify_options:
                "{{ state_attr('select.notifier_text_notify', 'options')
                }}"
              location_tracker: "{{ states('group.notifier_location_tracker') }}"
          - alias: IF DEBUG - PRETTY PRINT CONFIGURATION
            if: "{{ debug }}"
            then:
              - variables:
                  data: *id017
              - action: persistent_notification.create
                data:
                  notification_id: centro_notifiche_config
                  title: Configuración del Centro de Notificaciones
                  message: "{% set message = data %}

                    ```json

                    {{ message | to_json(pretty_print=true,sort_keys=True) }}

                    ```"
  - alias: notifier_auto_volume
    choose:
      - conditions:
          - "{{ enabled_auto_volume }}"
          - "{{ trigger.id in ['time_pattern_hours', 'notifier_auto_volume', 'hass_start',
            'reload'] }}"
          - "{{ state_attr('sensor.notifier_day_period_volume', 'vol') is not none }}"
        sequence:
          - variables:
              list_alexa:
                "{{ alexa_media_player | reject('in', exclude_media_player)
                | list }}"
              list_google:
                "{{ google_media_player | reject('in', exclude_media_player)
                | list }}"
              volume: "{{ states('sensor.notifier_day_period_volume') | float(10) }}"
              vol: "{{ state_attr('sensor.notifier_day_period_volume', 'vol') }}"
              period: "{{ states('sensor.notifier_day_period') }}"
          - parallel:
              - choose:
                  - conditions: "{{ list_alexa | length > 0 }}"
                    sequence:
                      - if:
                          "{{ is_state('input_boolean.notifier_alexa_smart_volume', 'on')
                          }}"
                        then:
                          - action: script.my_notify
                            data:
                              notify: false
                              call_no_annuncio: true
                              message:
                                Establecer volúmenes automáticos en silencio. {{ period }}
                                a {{ volume | int(0) }}%
                              no_show: "{{ True if trigger.platform is none else False }}"
                              alexa:
                                priority: true
                                auto_volumes: true
                                media_player: "{{ list_alexa }}"
                                volume: "{{ vol }}"
                        else:
                          - action: media_player.volume_set
                            data:
                              volume_level: "{{ vol }}"
                            target:
                              entity_id: "{{ list_alexa }}"
              - choose:
                  - conditions: "{{ list_google | length > 0 }}"
                    sequence:
                      - action: media_player.volume_set
                        data:
                          volume_level: "{{ vol }}"
                        target:
                          entity_id: "{{ list_google }}"
              - action: input_number.set_value
                data:
                  entity_id:
                    - input_number.notifier_intercom_volume
                  value: "{{ volume }}"
  - alias: notifier_intercom_message
    choose:
      - conditions:
          - "{{ trigger.id == 'notifier_intercom_message' }}"
          - "{{ states('input_text.notifier_intercom_message') not in ['unknown','unavailable','']
            }}"
        sequence:
          - action: script.my_notify
            data:
              title: Interfono
              message: "{{ states('input_text.notifier_intercom_message')~' ' }}"
              call_no_annuncio: true
              alexa:
                volume:
                  "{{ states('input_number.notifier_intercom_volume') | int(0) /
                  100 }}

                  "
              google:
                volume:
                  "{{ states('input_number.notifier_intercom_volume') | int(0) /
                  100 }}

                  "
          - action: input_text.set_value
            data:
              entity_id: input_text.notifier_intercom_message
              value: ""
  - alias: notifier_guest_mode
    choose:
      - conditions:
          - "{{ trigger.id == 'notifier_guest_mode' }}"
        sequence:
          - action: script.my_notify
            data:
              title: Modo invitado - {{ trigger.to_state.state | upper }}
              call_no_annuncio: true
              call_modo_ospite: true
              alexa: true
              google: true
  - alias: Home Assistant Start Stop Hub
    choose:
      - conditions:
          - "{{ enabled_home_assistant_event }}"
          - "{{ trigger.id is defined and trigger.id is search('^(hass_)', ignorecase=True)
            }}"
        sequence:
          - variables:
              title:
                "{{ (trigger.description | regex_replace(find=\"\\W|_|event\", replace=\"
                \") | trim | capitalize) \n  if trigger.description is defined else trigger.id
                }}\n"
              time: "{{(now().time()|string)[:-4]}}"
              icon:
                "{{ {'stop' in title: '\U0001F6D1',\n    'final' in title: '\U0001F3C1',\n
                \   'close' in title: '⛔',\n    'restart' in title: '\U0001F44D\U0001F44D',\n
                \   'start' in title: '\U0001F44D',\n    'Call' in title: '\U0001F4DE',\n
                \   }.get(True, '❗') }}\n"
              notify_action:
                "{% set CN_NOTIFY = iif(ha_event_notify, ha_event_notify,
                states('select.notifier_text_notify')) %} {% set HA_NOTIFY = ['persistent_notification',
                'notify'] %} {% set DEFAULT_NOTIFY = iif(CN_NOTIFY in ['unavailable', 'unknown'],
                HA_NOTIFY, CN_NOTIFY)%} {{ iif(DEFAULT_NOTIFY is string, (DEFAULT_NOTIFY\n
                \ | regex_replace(find=\" *, *\", replace=\",\") | lower).rsplit(\",\"),
                DEFAULT_NOTIFY) }}"
              start_message:
                "{{ iif(states('sensor.notifier_config') != \"\", \n  states('sensor.notifier_config'),
                'El sistema ') }} esta operativo!."
          - alias: Repeat text notify
            repeat:
              for_each: "{{ notify_service }}"
              sequence:
                - variables:
                    notify_name:
                      "{{ repeat.item | replace('notify.','') | slugify(separator='_')
                      }}"
                - action: notify.{{ notify_name }}
                  data:
                    title: "{{ icon }} {{ title }}"
                    message: "➡ {{ time }}

                      "
                - if:
                    - "{{ 'start' in title }}"
                    - "{{ is_script }}"
                  then:
                    - wait_template: "{{ is_state('sensor.notifier_debug_error', 'on') }}"
                      timeout: 180
                      continue_on_timeout: true
                    - if:
                        - "{{ states.sensor.ha_start.state is defined }}"
                      then:
                        - action: homeassistant.update_entity
                          entity_id:
                            - sensor.ha_start
                        - wait_template:
                            "{{ states('sensor.ha_start') not in ['Error', 'unknown']
                            }}"
                          timeout: "{{ wait.remaining }}"
                    - action: script.my_notify
                      data:
                        title: HomeAssistant Start!
                        notify: notify.{{ notify_name }}
                        message:
                          "\U0001F4EC {{ start_message }} \U0001F575\n\U0001F7E9 {{ iif(states('sensor.ha_start')
                          != 'unknown', \nstates('sensor.ha_start'), states('sensor.notifier_debug_error'))
                          }}\n"
                        alexa:
                          mode: "{{ repeat.index == 1 }}"
                          message: "{{ start_message }}"
                          voice: Giorgio
                          type: tts
                        google:
                          mode: "{{ repeat.index == 1 }}"
                          message: "{{ start_message }}"
