title: Notifier Hub
views:
  - title: Notifier Hub
    path: notifier-hub
    icon: mdi:bell-ring
    type: masonry
    badges: []
    cards:
      - type: entities
        title: Estado
        show_header_toggle: false
        entities:
          - entity: sensor.notifier_hub_debug
            name: Debug
          - entity: sensor.notifier_hub_last_message
            name: Ultimo mensaje
          - entity: binary_sensor.notifier_hub_alexa_speak
            name: Alexa hablando
          - entity: binary_sensor.notifier_hub_google_speak
            name: Google hablando

      - type: entities
        title: Canales
        show_header_toggle: false
        entities:
          - entity: switch.notifier_hub_text_notifications
            name: Texto
          - entity: switch.notifier_hub_screen_notifications
            name: Persistente
          - entity: switch.notifier_hub_alexa_notifications
            name: Alexa
          - entity: switch.notifier_hub_google_notifications
            name: Google
          - entity: switch.notifier_hub_phone_notifications
            name: Telefono

      - type: history-graph
        title: Actividad TTS
        hours_to_show: 6
        entities:
          - entity: binary_sensor.notifier_hub_alexa_speak
            name: Alexa
          - entity: binary_sensor.notifier_hub_google_speak
            name: Google

      - type: vertical-stack
        cards:
          - type: markdown
            content: |
              ## Pruebas rapidas
              Estos botones llaman al servicio `notifier_hub.send`.

          - type: horizontal-stack
            cards:
              - type: button
                name: Texto
                icon: mdi:message-text
                tap_action:
                  action: call-service
                  service: notifier_hub.send
                  data:
                    title: Dashboard
                    message: Prueba de notificacion desde Notifier Hub
                    notify: true

              - type: button
                name: Prioridad
                icon: mdi:alert-circle
                tap_action:
                  action: call-service
                  service: notifier_hub.send
                  data:
                    title: Prioridad
                    message: Mensaje prioritario de prueba desde Notifier Hub
                    notify: true
                    priority: true

          - type: horizontal-stack
            cards:
              - type: button
                name: Alexa
                icon: mdi:amazon-alexa
                tap_action:
                  action: call-service
                  service: notifier_hub.send
                  data:
                    title: Alexa
                    message: Prueba de voz desde Notifier Hub
                    notify: false
                    alexa: true

              - type: button
                name: Google
                icon: mdi:google-assistant
                tap_action:
                  action: call-service
                  service: notifier_hub.send
                  data:
                    title: Google
                    message: Prueba de voz desde Notifier Hub
                    notify: false
                    google: true

      - type: logbook
        title: Eventos recientes
        hours_to_show: 6
        entities:
          - sensor.notifier_hub_debug
          - sensor.notifier_hub_last_message
          - binary_sensor.notifier_hub_alexa_speak
          - binary_sensor.notifier_hub_google_speak

      - type: markdown
        content: |
          ## Registro YAML

          Para mostrar este panel en la barra lateral, anade esto a `configuration.yaml`:

          ```yaml
          lovelace:
            dashboards:
              notifier-hub:
                mode: yaml
                title: Notifier Hub
                icon: mdi:bell-ring
                show_in_sidebar: true
                filename: notifier_hub_dashboard.yaml
          ```
