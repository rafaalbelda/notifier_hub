type: custom:vertical-stack-in-card
cards:
  - type: custom:paper-buttons-row
    styles:
      background: var(--primary-color)
    buttons:
      - entity: sensor.notifier_hub_personal_assistant
        icon: mdi:bell-ring
        name: "{{ states(config.entity) }}"
        layout: icon|name
        styles:
          button:
            font-size: 16px
            color: var(--primary-text-color)
            justify-content: flex-start
        tap_action:
          action: navigate
          navigation_path: /notifier-hub
  - type: conditional
    conditions:
      - entity: sensor.notifier_hub_debug
        state_not: OK
      - entity: sensor.notifier_hub_debug
        state_not: "on"
      - entity: sensor.notifier_hub_debug
        state_not: "off"
    card:
      type: markdown
      card_mod:
        style: |
          ha-markdown.no-header {
            padding: 0px !important;
          }
      content: |-
        <ha-alert alert-type="error">
          <details>
            <summary>Attention {{ user }}, {{ states('sensor.notifier_hub_personal_assistant') }} has a status that needs review</summary>
            {{ states('sensor.notifier_hub_debug') }}
          </details>
        </ha-alert>
  - type: custom:paper-buttons-row
    styles:
      display: grid
      grid-template-columns: repeat(4, 1fr)
      font-size: 0.9em
    buttons:
      - entity: binary_sensor.notifier_hub_home_occupied
        layout: icon|name|state
        name: "{{state_attr('sensor.notifier_hub_home_people', 'home_person_names')}}"
        tooltip: People at home
        styles:
          button:
            justify-content: flex-start
            color: var(--state-person-home-color)
          icon:
            scale: 70%
        state_icons:
          "on": mdi:home-account
          "off": mdi:home-outline
        state_styles:
          "off":
            button:
              color: var(--red-color)
      - entity: sensor.notifier_hub_day_period
        layout: state
        state: >-
          {{
            {
              'late_night': 'Late night',
              'early_morning': 'Early morning',
              'morning': 'Morning',
              'afternoon': 'Afternoon',
              'evening': 'Evening',
              'night': 'Night',
            }.get(states(config.entity), states(config.entity))
          }}
        styles:
          button:
            color: var(--info-color)
      - entity: sensor.notifier_hub_day_period_volume
        layout: name|state
        name: VOL
        state: "{{ states(config.entity) }}%"
        styles:
          button:
            color: var(--info-color)
        tap_action:
          action: more-info
      - entity: switch.notifier_hub_auto_volume
        layout: icon|name
        name: Auto
        state_icons:
          "on": mdi:volume-high
          "off": mdi:volume-off
        styles:
          button:
            justify-content: flex-start
            color: >-
              {{ iif(is_state(config.entity, 'on'), 'var(--state-active-color)',
              'var(--info-color)') }}
          icon:
            scale: 70%
  - type: custom:paper-buttons-row
    styles:
      display: grid
      grid-template-columns: repeat(4, 1fr)
      font-size: 0.9em
    buttons:
      - entity: switch.notifier_hub_alexa_notifications
        layout: icon|name
        name: Alexa
        styles:
          button:
            justify-content: flex-start
            color: >-
              {{ iif(is_state('binary_sensor.notifier_hub_alexa_speak', 'on'),
              'var(--warning-color)', '') }}
            animation: >-
              {{ iif(is_state('binary_sensor.notifier_hub_alexa_speak', 'on'),
              'blink 1.5s linear infinite alternate', '') }}
          icon:
            scale: 70%
      - entity: binary_sensor.notifier_hub_alexa_speak
        layout: name|state
        name: TTS
        state_icons:
          "on": mdi:speaker-play
          "off": mdi:speaker
      - entity: switch.notifier_hub_google_notifications
        layout: icon|name
        name: Google
        styles:
          button:
            justify-content: flex-start
            color: >-
              {{ iif(is_state('binary_sensor.notifier_hub_google_speak', 'on'),
              'var(--warning-color)', '') }}
            animation: >-
              {{ iif(is_state('binary_sensor.notifier_hub_google_speak', 'on'),
              'blink 1.5s linear infinite alternate', '') }}
          icon:
            scale: 70%
      - entity: binary_sensor.notifier_hub_google_speak
        layout: name|state
        name: TTS
        state_icons:
          "on": mdi:speaker-play
          "off": mdi:speaker
  - type: divider
    style:
      background-color: var(--primary-color)
      height: 1px
  - type: custom:paper-buttons-row
    styles:
      display: grid
      grid-template-columns: 1.35fr repeat(5, 1fr)
      font-size: 0.9em
    buttons:
      - layout: name
        name: Voice
        tap_action:
          action: none
        styles:
          button:
            justify-content: flex-start
            color: var(--primary-text-color)
      - entity: switch.notifier_hub_speech_notifications
        layout: icon
        tooltip: Voice
        state_icons:
          "on": mdi:account-voice
          "off": mdi:account-voice-off
      - entity: switch.notifier_hub_speech_home_only
        layout: icon
        tooltip: Voice only at home
        state_icons:
          "on": mdi:home-account
          "off": mdi:home-outline
      - entity: switch.notifier_hub_alexa_notifications
        layout: icon
        tooltip: Alexa
        state_icons:
          "on": mdi:speaker-message
          "off": mdi:speaker-off
      - entity: switch.notifier_hub_google_notifications
        layout: icon
        tooltip: Google
        state_icons:
          "on": mdi:google-assistant
          "off": mdi:google-assistant
      - entity: switch.notifier_hub_phone_notifications
        layout: icon
        tooltip: Phone
        state_icons:
          "on": mdi:phone-message
          "off": mdi:phone-off
  - type: custom:paper-buttons-row
    styles:
      display: grid
      grid-template-columns: 0.95fr repeat(3, 0.65fr) 0.8fr repeat(4, 0.65fr)
      font-size: 0.85em
    buttons:
      - layout: name
        name: Text
        tap_action:
          action: none
        styles:
          button:
            justify-content: flex-start
            color: var(--primary-text-color)
      - entity: switch.notifier_hub_text_notifications
        layout: icon
        tooltip: Text
        state_icons:
          "on": mdi:message-text
          "off": mdi:message-text-outline
      - entity: switch.notifier_hub_screen_notifications
        layout: icon
        tooltip: Persistent
        state_icons:
          "on": mdi:message-badge
          "off": mdi:message-badge-outline
      - entity: switch.notifier_hub_home_assistant_event_notifications
        layout: icon
        tooltip: HA events
        state_icons:
          "on": mdi:home-assistant
          "off": mdi:home-assistant
      - layout: name
        name: Modes
        tap_action:
          action: none
        styles:
          button:
            justify-content: flex-start
            color: var(--primary-text-color)
      - entity: switch.notifier_hub_dnd
        layout: icon
        tooltip: Do not disturb
        state_icons:
          "on": mdi:minus-circle
          "off": mdi:minus-circle-off
      - entity: switch.notifier_hub_night_dnd
        layout: icon
        tooltip: Night DND
        state_icons:
          "on": mdi:weather-night
          "off": mdi:weather-night
      - entity: switch.notifier_hub_guest_mode
        layout: icon
        tooltip: Guests
        state_icons:
          "on": mdi:account-group
          "off": mdi:account-group-outline
      - entity: switch.notifier_hub_priority_message
        layout: icon
        tooltip: Priority
        state_icons:
          "on": mdi:alert-circle
          "off": mdi:alert-circle-outline
  - type: divider
    style:
      background-color: var(--primary-color)
      height: 1px
  - type: entities
    card_mod:
      style: |
        ha-card {
          background: none;
          border-radius: 0px;
          box-shadow: none;
        }
        .card-content {
          padding: 0px;
          margin: 0;
        }
    entities:
      - type: custom:fold-entity-row
        clickable: true
        head:
          entity: sensor.notifier_hub_debug
          icon: mdi:cog
          name: Configuration
          tap_action:
            action: fire-dom-event
            fold_row: true
        entities:
          - entity: sensor.notifier_hub_debug
            name: Debug
          - entity: sensor.notifier_hub_personal_assistant
            name: Assistant
          - entity: sensor.notifier_hub_last_message
            name: Last message
          - entity: switch.notifier_hub_text_notifications
            name: Text
          - entity: switch.notifier_hub_screen_notifications
            name: Persistent
          - entity: switch.notifier_hub_speech_notifications
            name: Voice
          - entity: switch.notifier_hub_speech_home_only
            name: Voice only when someone is home
          - entity: switch.notifier_hub_night_dnd
            name: Night DND
          - entity: switch.notifier_hub_home_assistant_event_notifications
            name: Home Assistant events
      - type: custom:fold-entity-row
        clickable: true
        head:
          entity: switch.notifier_hub_auto_volume
          icon: mdi:volume-high
          name: Auto Volume Levels
          tap_action:
            action: fire-dom-event
            fold_row: true
        entities:
          - entity: switch.notifier_hub_auto_volume
            name: Auto volume
          - entity: switch.notifier_hub_auto_volume_controls_players
            name: Control player volumes
          - number.notifier_hub_altas_horas_volume
          - number.notifier_hub_primera_hora_volume
          - number.notifier_hub_manana_volume
          - number.notifier_hub_tarde_volume
          - number.notifier_hub_atardecer_volume
          - number.notifier_hub_noche_volume
      - type: custom:fold-entity-row
        clickable: true
        head:
          entity: sensor.notifier_hub_day_period
          icon: mdi:clock-time-four-outline
          name: Auto Volume Schedule
          tap_action:
            action: fire-dom-event
            fold_row: true
        entities:
          - time.notifier_hub_altas_horas_start
          - time.notifier_hub_primera_hora_start
          - time.notifier_hub_manana_start
          - time.notifier_hub_tarde_start
          - time.notifier_hub_atardecer_start
          - time.notifier_hub_noche_start
      - type: custom:fold-entity-row
        clickable: true
        head:
          entity: switch.notifier_hub_alexa_notifications
          icon: mdi:speaker-message
          name: Alexa
          tap_action:
            action: fire-dom-event
            fold_row: true
        entities:
          - switch.notifier_hub_alexa_notifications
          - binary_sensor.notifier_hub_alexa_speak
          - type: attribute
            entity: binary_sensor.notifier_hub_alexa_speak
            attribute: media_player
            name: Players
          - type: attribute
            entity: binary_sensor.notifier_hub_alexa_speak
            attribute: message
            name: Message
          - type: button
            name: Test Alexa
            icon: mdi:speaker-message
            tap_action:
              action: call-service
              service: notifier_hub.send
              data:
                title: Alexa
                message: Voice test from Notifier Hub
                notify: false
                alexa: true
      - type: custom:fold-entity-row
        clickable: true
        head:
          entity: switch.notifier_hub_google_notifications
          icon: mdi:google-assistant
          name: Google / Cast
          tap_action:
            action: fire-dom-event
            fold_row: true
        entities:
          - switch.notifier_hub_google_notifications
          - binary_sensor.notifier_hub_google_speak
          - type: attribute
            entity: binary_sensor.notifier_hub_google_speak
            attribute: players
            name: Players
          - type: attribute
            entity: binary_sensor.notifier_hub_google_speak
            attribute: message
            name: Message
          - type: button
            name: Test Google
            icon: mdi:google-assistant
            tap_action:
              action: call-service
              service: notifier_hub.send
              data:
                title: Google
                message: Voice test from Notifier Hub
                notify: false
                google: true
      - type: custom:fold-entity-row
        clickable: true
        head:
          entity: text.notifier_hub_dashboard_message
          icon: mdi:bullhorn-outline
          name: Send message
          tap_action:
            action: fire-dom-event
            fold_row: true
          extend_paper_buttons_row:
            hide_state: true
            position: right
            buttons:
              - entity: button.notifier_hub_send_dashboard_message
                layout: icon
                icon: mdi:send
                tap_action:
                  action: call-service
                  service: button.press
                  target:
                    entity_id: button.notifier_hub_send_dashboard_message
                styles:
                  ripple:
                    color: var(--accent-color)
        entities:
          - entity: text.notifier_hub_dashboard_message
            name: Message
          - type: section
            label: Quick tests
          - type: button
            name: Text
            icon: mdi:message-text
            tap_action:
              action: call-service
              service: notifier_hub.send
              data:
                title: Dashboard
                message: Notification test from Notifier Hub
                notify: true
          - type: button
            name: Priority
            icon: mdi:alert-circle
            tap_action:
              action: call-service
              service: notifier_hub.send
              data:
                title: Priority
                message: Priority test message from Notifier Hub
                notify: true
                priority: true
          - type: button
            name: Voice
            icon: mdi:account-voice
            tap_action:
              action: call-service
              service: notifier_hub.send
              data:
                title: Voice
                message: Voice test from Notifier Hub
                notify: false
                alexa: true
                google: true
  - type: conditional
    conditions:
      - entity: sensor.notifier_hub_last_message
        state_not: ""
    card:
      type: markdown
      entity_id: sensor.notifier_hub_last_message
      card_mod:
        style: |
          ha-markdown.no-header {
            padding: 0px !important;
          }
      content: |-
        <ha-alert alert-type="success">
          <details>
            <summary>Last message</summary>
            {{ states('sensor.notifier_hub_last_message') }}
          </details>
        </ha-alert>
